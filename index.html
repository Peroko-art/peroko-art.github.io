<html lang="en">

      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-NGT1HQSQY1");

    <script
      id="usercentrics-cmp"
      src="https://app.usercentrics.eu/browser-ui/latest/loader.js"
      data-settings-id="29rhL8yF_fAaUk"
      async
    ></script>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8" />
    <title>Peroko's Webpage</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="container-top">
      <input
        class="submit"
        type="button"
        onclick="location.href='https://docs.google.com/forms/d/e/1FAIpQLSfwBBgxOO6vhaScJa6Yi4lkBJ5JhAuUAZ-jmxXqQs-1VwowVA/viewform?usp=sharing';"
        value="Something on your mind?"
      />

      <nav class="dropdown">
        <button class="dropbtn">Explore</button>
        <div id="myDropdown" class="dropdown-content">
          <a href="index.html">main</a>
          <a href="halloflove.html">hall of love</a>
          <a href="blog.html">blog</a>
          <a href="contact.html">contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Peroko's Webpage</h1>
        <p class="subtitle">An archive of my own</p>
      </section>

      <section class="liminality">
        <button id="openModal" class="primary-btn">LIMINALITIES</button>

        <div class="modal-overlay">
          <div class="modal">
            <p class="modal-title">Liminalities</p>
            <div class="liminality-gallery">
              <p>Pictures I've taken of liminal spaces:</p>
              <img src="liminality 1.jpg" alt="liminality1" class="limipics" />
              <img src="liminality 2.jpg" alt="liminality2" class="limipics" />
              <img src="liminality 3.jpg" alt="liminality3" class="limipics" />
              <img src="liminality 4.jpg" alt="liminality4" class="limipics" />
              <img src="liminality 5.jpg" alt="liminality5" class="limipics" />
              <img src="liminality 6.jpg" alt="liminality6" class="limipics" />
              <img src="liminality 7.jpg" alt="liminality7" class="limipics" />
              <img src="liminality 8.jpg" alt="liminality8" class="limipics" />
            </div>
            <button class="close-btn" id="closeModal">Close</button>
          </div>
        </div>
      </section>

      <section class="grid-container">
        <img
          id="egg"
          src="egg_closed.png"
          alt="egg"
          onmouseover="this.src='egg_opened.png';"
          onmouseout="this.src='egg_closed.png';"
          onclick="this.src='egg_ate.png';"
        />

        <img src="lightscars.gif" alt="moving lightscars" class="lightscars" />
      </section>
    </main>

    <footer>
      <p>Stay delusional.</p>
    </footer>

    <script>
      const modal = document.querySelector(".modal");
      const modalOverlay = document.querySelector(".modal-overlay");
      const openModal = document.getElementById("openModal");
      const closeModal = document.getElementById("closeModal");

      modal.addEventListener("click", (event) => event.stopPropagation());
      openModal.addEventListener("click", () => {
        modal.classList.add("show");
        modal.style.display = "block";
        modalOverlay.style.display = "block";
      });
      closeModal.addEventListener("click", () => {
        modal.classList.remove("show");
        modal.style.display = "none";
        modalOverlay.style.display = "none";
      });
      modalOverlay.addEventListener("click", () => {
        modal.classList.remove("show");
        modal.style.display = "none";
        modalOverlay.style.display = "none";
      });
    </script>
  </body>
</html>
